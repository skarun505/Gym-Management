<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c044ef"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow halo -->
  <circle cx="256" cy="256" r="140" fill="url(#glow)" opacity="0.18" filter="url(#blur-glow)"/>
  <!-- Dumbbell icon (centered) -->
  <!-- Left weight -->
  <rect x="80" y="216" width="48" height="80" rx="16" fill="url(#glow)"/>
  <rect x="68" y="230" width="20" height="52" rx="10" fill="url(#glow)"/>
  <!-- Right weight -->
  <rect x="384" y="216" width="48" height="80" rx="16" fill="url(#glow)"/>
  <rect x="424" y="230" width="20" height="52" rx="10" fill="url(#glow)"/>
  <!-- Bar -->
  <rect x="128" y="240" width="256" height="32" rx="16" fill="white" opacity="0.95"/>
  <!-- G text -->
  <text x="256" y="380" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="white" opacity="0.35" text-anchor="middle">GymPro</text>
</svg>
